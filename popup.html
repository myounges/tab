<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Capture and archive all open browser tabs with one click.">
  <meta name="theme-color" content="#E2E8F0">
  <title>Mike's Tab Archiver</title>
  <link rel="stylesheet" href="archive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    body {
      width: 360px;
      padding: 12px;
      background: var(--color-bg);
    }
    header {
      background: none;
      padding: 0;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 20px;
      text-align: center;
    }
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--color-border);
      border-left: 3px solid var(--color-accent);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card:last-child {
      margin-bottom: 0;
    }
    .capture-btn {
      width: 100%;
      padding: 12px;
      background: #4F46E5;
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .capture-btn:hover {
      background: #4338CA;
    }
    .capture-btn:disabled {
      background: var(--color-empty);
      cursor: not-allowed;
    }
    .capture-btn:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: var(--color-text-muted);
    }
    .section-title {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 13px;
    }
    .recent-item:last-child {
      border-bottom: none;
    }
    .recent-item .count {
      background: var(--color-hover);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      color: var(--color-text-muted);
    }
    .view-all {
      display: block;
      text-align: center;
      padding-top: 10px;
      color: var(--color-accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    .view-all:hover {
      color: var(--color-accent-hover);
      text-decoration: underline;
    }
    .view-all:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
    .empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--color-empty);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mike's Tab Archiver</h1>
  </header>

  <div class="card">
    <button class="capture-btn" id="captureBtn">Capture All Tabs</button>
    <div id="status" role="status" aria-live="polite"></div>
  </div>

  <div class="card">
    <h2 class="section-title">Recent Archives</h2>
    <div id="recentList"><div class="empty">No archives yet</div></div>
    <a class="view-all" id="viewAll" href="archive.html">View All Archives →</a>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
